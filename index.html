<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medallero Cervecero</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <img src="Logo_Catas_Colab.png" alt="Logo" class="main-logo">
        <h1>Medallero Cervecerías Chilenas</h1>
    </header>

    <main class="container">
        <section class="charts-grid">
            <div class="card">
                <h2>Ranking de Cervecerías</h2>
                <div id="chart-breweries">Cargando datos...</div>
            </div>
            <div class="card">
                <h2>Estilos más Premiados</h2>
                <div id="chart-styles">Cargando datos...</div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <h3>Certámenes y Premiaciones</h3>
        <div id="grid-logos" class="logos-grid"></div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
