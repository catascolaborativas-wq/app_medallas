<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard APP MEDALLAS</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; padding: 20px; }
        .card { background: white; max-width: 800px; margin: 20px auto; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #333; }
        .chart-wrapper { height: 350px; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>📊 Estadísticas de Medallas</h1>
        
        <h3>🏆 Top 15 Cervecerías Chilenas</h3>
        <div class="chart-wrapper"><canvas id="graficoCervecerias"></canvas></div>

        <h3>🍺 Estilos más premiados (Chile)</h3>
        <div class="chart-wrapper" style="height: 450px;"><canvas id="graficoEstilos"></canvas></div>

        <h3>🌍 Top 5 Países con más Medallas</h3>
        <div class="chart-wrapper"><canvas id="graficoPaises"></canvas></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
